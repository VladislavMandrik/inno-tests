# ==================== Browser Dimensions ====================
browser.width=1920
browser.height=1080
# ==================== Chrome ====================
chrome.args=--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--disable-extensions,--disable-notifications,--disable-infobars,--remote-allow-origins=*
chrome.headless=--headless=new
chrome.window.size=--window-size=%d,%d
chrome.exclude.switches=enable-automation
# ==================== Chrome Preferences ====================
chrome.prefs.key.notifications=profile.default_content_setting_values.notifications
chrome.prefs.notifications=2
chrome.prefs.key.credentials=credentials_enable_service
chrome.prefs.credentials.service=false
chrome.prefs.key.password=password_manager_enabled
chrome.prefs.password.manager=false
# ==================== Firefox ====================
firefox.headless=--headless
firefox.width=--width=%d
firefox.height=--height=%d
# ==================== Firefox Preferences ====================
firefox.prefs.key.web.notifications=dom.webnotifications.enabled
firefox.prefs.web.notifications=false
firefox.prefs.key.push=dom.push.enabled
firefox.prefs.push.enabled=false
firefox.prefs.key.download.folder=browser.download.folderList
firefox.prefs.download.folder.list=2
firefox.prefs.key.never.ask=browser.helperApps.neverAsk.saveToDisk
firefox.prefs.never.ask.save.to.disk=application/octet-stream
# ==================== CI ====================
ci.args=--disable-web-security,--allow-running-insecure-content,--no-zygote,--disable-setuid-sandbox,--single-process
# ==================== WireMock Proxy ====================
wiremock.proxy.property=wiremock.proxy
ignore.certificate.errors=--ignore-certificate-errors
accept.insecure.certs=true
# ==================== Experimental Options ====================
prefs.key=prefs
exclude.switches.key=excludeSwitches
use.automation.extension.key=useAutomationExtension
use.automation.extension.value=false
# ==================== Safari ====================
safari.options.key=safari.options
safari.automatic.inspection=false
safari.technology.preview=false