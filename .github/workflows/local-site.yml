name: Auth API Tests

on:
  push:
  pull_request:
    branches: [ master ]
    types: [ closed ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: usr
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      USER_USERNAME: ${{ secrets.USER_USERNAME }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Clone and start site
        run: |
          git clone https://github.com/VladislavMandrik/auth-service.git ../auth-service
          cd ../auth-service
          mvn spring-boot:run -Dspring-boot.run.profiles=test &
          sleep 30
      - name: Run AuthApiTests
        id: tests
        run: |
          mvn clean test -Dtest=AuthApiTests,RegistrationApiTests -Dbase.url=http://localhost:8081 --batch-mode | tee test-output.log
          TOTAL=$(grep -oP 'Tests run: \K\d+' test-output.log | tail -1)
          FAILURES=$(grep -oP 'Failures: \K\d+' test-output.log | tail -1)
          ERRORS=$(grep -oP 'Errors: \K\d+' test-output.log | tail -1)
          SKIPPED=$(grep -oP 'Skipped: \K\d+' test-output.log | tail -1)
          PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))
          echo "tests_total=$TOTAL" >> $GITHUB_OUTPUT
          echo "tests_passed=$PASSED" >> $GITHUB_OUTPUT
          echo "tests_failed=$FAILURES" >> $GITHUB_OUTPUT
          echo "tests_errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "tests_skipped=$SKIPPED" >> $GITHUB_OUTPUT
      - name: Generate Allure Report
        if: always()
        run: mvn allure:report --batch-mode
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-auth
          path: target/allure-report/
          retention-days: 7
      - name: Send Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            🔔 <b>Auth API Тесты завершены!</b>
            🧪 <b>Результаты тестов:</b>
            📊 Всего: ${{ steps.tests.outputs.tests_total }}
            ✅ Прошло: ${{ steps.tests.outputs.tests_passed }}
            ❌ Упало: ${{ steps.tests.outputs.tests_failed }}
            ⚠️ Ошибок: ${{ steps.tests.outputs.tests_errors }}
            ⏭️ Пропущено: ${{ steps.tests.outputs.tests_skipped }}
            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">📋 Логи сборки</a>
            <a href="https://vladislavmandrik.github.io/inno-tests/auth-tests/">📈 Allure-отчёт</a>

  deploy-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report-auth
          path: allure-report
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: auth-tests