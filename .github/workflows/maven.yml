name: Java Maven Tests with Allure

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Setup Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y -qq ./google-chrome-stable_current_amd64.deb

      - name: Run tests
        run: mvn clean test -Dheadless=true --batch-mode

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report --batch-mode

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report/
          retention-days: 7

      - name: Send Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            🔔 <b>Тесты завершены!</b>
            
            📋 Проект: <b>InnoTests</b>
            🌿 Ветка: <b>master</b>
            📊 Статус: <b>${{ job.status }}</b>
            
            🔗 <a href="https://github.com/VladislavMandrik/inno-tests/actions/runs/${{ github.run_id }}">Посмотреть логи</a>
            📈 <a href="https://vladislavmandrik.github.io/inno-tests/">Allure-отчёт</a>

  deploy-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report