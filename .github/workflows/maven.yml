name: Java Maven Tests with Allure

on:
  push:
    branches: [ code-fix ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Setup Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y -qq ./google-chrome-stable_current_amd64.deb

      - name: Run tests
        id: tests
        run: |
          mvn clean test -Dheadless=true --batch-mode | tee test-output.log
          echo "tests_passed=$(grep -oP 'Tests run: \K[0-9]+' test-output.log | head -1)" >> $GITHUB_OUTPUT
          echo "tests_failed=$(grep -oP 'Failures: \K[0-9]+' test-output.log | head -1)" >> $GITHUB_OUTPUT
          echo "tests_errors=$(grep -oP 'Errors: \K[0-9]+' test-output.log | head -1)" >> $GITHUB_OUTPUT
          echo "tests_skipped=$(grep -oP 'Skipped: \K[0-9]+' test-output.log | head -1)" >> $GITHUB_OUTPUT

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report --batch-mode

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report/
          retention-days: 7

      - name: Send Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            🔔 <b>Тесты завершены!</b>
            
            📋 <b>Проект:</b> ${{ github.repository }}
            🌿 <b>Ветка:</b> ${{ github.ref_name }}
            👤 <b>Автор:</b> ${{ github.actor }}
            📊 <b>Статус:</b> ${{ job.status }}
            
            🧪 <b>Результаты тестов:</b>
            ✅ Успешно: ${{ steps.tests.outputs.tests_passed }}
            ❌ Упало: ${{ steps.tests.outputs.tests_failed }}
            ⚠️ Ошибок: ${{ steps.tests.outputs.tests_errors }}
            ⏭ Пропущено: ${{ steps.tests.outputs.tests_skipped }}
            
            📝 <b>Коммит:</b> ${{ github.event.head_commit.message }}
            
            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">📋 Логи сборки</a>
            <a href="https://vladislavmandrik.github.io/inno-tests/">📈 Allure-отчёт</a>

  deploy-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report